<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>调音器 · 节拍器</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ef;
  --surface:#ffffff;
  --border:#e5e2dc;
  --text:#1a1a1a;
  --text2:#999793;
  --accent:#d44f4f;
  --green:#4caf50;
  --yellow:#f5a623;
  --radius:10px;
  --font:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-tap-highlight-color:transparent}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;touch-action:pan-y}

.header{text-align:center;padding:16px 16px 0;flex-shrink:0}
.header h1{font-size:17px;font-weight:500;letter-spacing:4px;color:var(--text2);margin-bottom:12px}
.tab-bar{display:flex;gap:0;background:var(--surface);border-radius:var(--radius);padding:3px;border:1px solid var(--border)}
.tab-btn{flex:1;padding:9px;text-align:center;border:none;background:transparent;color:var(--text2);font-size:14px;font-weight:400;border-radius:7px;cursor:pointer;transition:.2s}
.tab-btn.active{background:var(--text);color:#fff;font-weight:500}

.content{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.tab-panel{display:none;flex-direction:column;gap:16px}
.tab-panel.active{display:flex}

/* ===== Tuner ===== */
.tuner-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:28px 20px 20px;text-align:center}
.tuner-note{font-size:80px;font-weight:600;letter-spacing:2px;line-height:1;margin-bottom:2px;transition:color .15s}
.tuner-note.in-tune{color:var(--green)}
.tuner-meta{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
.tuner-octave{font-size:20px;font-weight:400;color:var(--text2)}
.tuner-freq{font-size:14px;font-weight:500;color:var(--text2)}
.tuner-freq strong{color:var(--text);font-weight:500}
/* Horizontal gauge bar */
.tuner-bar-wrap{position:relative;padding:4px 0 28px;margin:0 auto 12px;max-width:300px}
.tuner-bar{position:relative;height:6px;border-radius:3px;background:linear-gradient(to right,var(--yellow),var(--green) 25%,var(--green) 75%,var(--yellow));opacity:.35}
.tuner-bar-track{position:absolute;left:0;right:0;top:4px;height:6px;border-radius:3px;background:linear-gradient(to right,var(--yellow),var(--green) 25%,var(--green) 75%,var(--yellow))}
.tuner-bar-needle{position:absolute;top:-10px;width:2px;height:26px;background:var(--text);border-radius:1px;left:50%;transition:left .06s ease;z-index:2;pointer-events:none}
.tuner-bar-needle::after{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:8px;height:8px;background:var(--text);border-radius:50%}
.tuner-bar-marker{position:absolute;top:0;bottom:0;left:50%;width:1px;background:rgba(0,0,0,.15);transform:translateX(-50%);z-index:1}
.tuner-bar-label{position:absolute;bottom:4px;font-size:11px;color:var(--text2);pointer-events:none}
.tuner-bar-label.flat{left:6%}
.tuner-bar-label.sharp{right:6%}
.tuner-bar-label.center{left:50%;transform:translateX(-50%);font-size:12px;color:var(--green);font-weight:500}
.cents-label{font-size:14px;font-weight:400;min-height:20px;margin-bottom:2px}
.cents-label.flat{color:var(--yellow)}.cents-label.sharp{color:var(--yellow)}.cents-label.in-tune{color:var(--green)}
.tuner-msg{font-size:13px;color:var(--text2);min-height:18px;margin-bottom:4px}
/* Instrument icons */
.inst-row{display:flex;gap:8px;justify-content:center}
.inst-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px 10px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);cursor:pointer;transition:.2s;-webkit-tap-highlight-color:transparent}
.inst-btn:active{transform:scale(.96)}
.inst-btn.active{border-color:var(--text);background:var(--text)}
.inst-btn.active .inst-label{color:#fff}
.inst-btn.active svg *{stroke:#fff}
.inst-btn svg{width:36px;height:48px}
.inst-btn svg *{fill:none;stroke:var(--text2);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.inst-label{font-size:12px;font-weight:500;color:var(--text2);transition:color .2s}
.inst-tune{font-size:10px;color:var(--text2);margin-top:-2px}
/* Mic status */
.tuner-mic-status{font-size:12px;color:var(--text2);text-align:center;padding:4px;display:flex;align-items:center;justify-content:center;gap:6px}
.mic-dot{width:8px;height:8px;border-radius:50%;background:var(--text2)}
.mic-dot.active{background:var(--green);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

@media(max-width:420px){
  .tuner-note{font-size:60px}
  .inst-btn svg{width:28px;height:38px}
}

/* ===== Metronome ===== */
.metro-canvas-wrap{display:flex;justify-content:center;align-items:center;padding:0;position:relative;touch-action:none}
#metroCanvas{display:block;width:100%;max-width:340px;height:auto;aspect-ratio:1;cursor:pointer;touch-action:none;border-radius:50%;box-shadow:0 4px 20px rgba(0,0,0,.06)}

.btn-group{display:flex;gap:5px;flex-wrap:wrap}
.btn-group .btn{flex:1;padding:9px 6px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;transition:.15s;text-align:center;min-width:0}
.btn-group .btn:active{transform:scale(.95)}
.btn-group .btn.on{background:var(--text);color:#fff;border-color:var(--text)}

.metro-actions{display:flex;gap:10px;margin-top:2px}
.metro-play-btn{flex:1;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;transition:.15s;color:#fff;background:var(--text)}
.metro-play-btn:active{transform:scale(.97)}
.metro-play-btn.stop{background:var(--accent)}
.tap-btn{padding:14px 20px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text2);font-size:14px;cursor:pointer;transition:.15s}
.tap-btn:active{background:var(--text);color:#fff;border-color:var(--text)}

@media(max-width:420px){
  .tuner-note{font-size:56px}
  .gauge-wrap{width:160px;height:80px}
  .gauge-needle{height:68px}
}
</style>
</head>
<body>

<div class="header">
  <h1>调音器 · 节拍器</h1>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="tuner">调音器</button>
    <button class="tab-btn" data-tab="metronome">节拍器</button>
  </div>
</div>

<div class="content">

  <!-- ===== TUNER ===== -->
  <div class="tab-panel active" id="panel-tuner">
    <div class="tuner-card">
      <div class="tuner-note" id="noteDisplay">-</div>
      <div class="tuner-meta">
        <span class="tuner-octave" id="octaveDisplay"></span>
        <span class="tuner-freq" id="freqDisplay"><strong>—</strong> Hz</span>
      </div>

      <div class="tuner-bar-wrap">
        <div class="tuner-bar" id="tunerBarBg"></div>
        <div class="tuner-bar-track" id="tunerBarTrack">
          <div class="tuner-bar-needle" id="barNeedle"></div>
          <div class="tuner-bar-marker"></div>
        </div>
        <span class="tuner-bar-label flat">♭</span>
        <span class="tuner-bar-label center" id="barCenterLabel">✓</span>
        <span class="tuner-bar-label sharp">♯</span>
      </div>

      <div class="cents-label" id="centsLabel">&nbsp;</div>
      <div class="tuner-msg" id="tunerMsg">请允许麦克风权限</div>
    </div>

    <div class="inst-row" id="instrumentRow">
      <button class="inst-btn active" data-inst="guitar">
        <svg viewBox="0 0 40 52"><path d="M22 4v14"/><path d="M18 4c-2 0-4 1-4 3v4c0 4 15 4 15 0V7c0-2-1-3-4-3h-7z"/><path d="M12 27c0-2 2-4 8-4s8 2 8 4"/><ellipse cx="20" cy="38" rx="12" ry="14"/><circle cx="20" cy="38" r="4"/><path d="M14 46c2 2 4 4 6 4s4-2 6-4"/><path d="M18 6l-6 24"/><path d="M22 6l6 24"/></svg>
        <span class="inst-label">吉他</span>
      </button>
      <button class="inst-btn" data-inst="bass">
        <svg viewBox="0 0 40 56"><path d="M22 2v16"/><path d="M18 2c-2 0-4 1-4 4v5c0 4 15 4 15 0V6c0-3-1-4-4-4h-7z"/><path d="M12 31c0-2 2-4 8-4s8 2 8 4"/><ellipse cx="20" cy="42" rx="13" ry="15"/><circle cx="20" cy="42" r="4"/><path d="M14 50c2 2 4 4 6 4s4-2 6-4"/><path d="M17 4l-5 27"/><path d="M23 4l5 27"/></svg>
        <span class="inst-label">贝斯</span>
      </button>
      <button class="inst-btn" data-inst="ukulele">
        <svg viewBox="0 0 36 40"><path d="M20 4v8"/><path d="M17 4c-1 0-3 1-3 2v3c0 3 12 3 12 0V6c0-1-1-2-3-2h-6z"/><ellipse cx="18" cy="27" rx="10" ry="11"/><circle cx="18" cy="27" r="3"/><path d="M16 35l4 3"/><path d="M16 4l-3 23"/><path d="M20 4l3 23"/></svg>
        <span class="inst-label">尤克里里</span>
      </button>
    </div>

    <div style="text-align:center;font-size:11px;color:var(--text2)" id="tuningLabel">标准 (E2 A2 D3 G3 B3 E4)</div>
    <select id="tuningSelect" style="position:absolute;opacity:0;pointer-events:none;height:0;width:0"></select>

    <div class="tuner-mic-status">
      <span class="mic-dot" id="micDot"></span>
      <span id="micStatus">等待启动</span>
    </div>
  </div>

  <!-- ===== METRONOME ===== -->
  <div class="tab-panel" id="panel-metronome">
    <div class="metro-canvas-wrap">
      <canvas id="metroCanvas" width="640" height="640"></canvas>
    </div>

    <div class="btn-group" id="timeSigGroup">
      <button class="btn" data-sig="2/4">2/4</button>
      <button class="btn" data-sig="3/4">3/4</button>
      <button class="btn on" data-sig="4/4">4/4</button>
      <button class="btn" data-sig="6/8">6/8</button>
    </div>

    <div class="btn-group" id="subdivGroup">
      <button class="btn on" data-sub="0">无</button>
      <button class="btn" data-sub="2">八分</button>
      <button class="btn" data-sub="3">三连</button>
      <button class="btn" data-sub="4">十六分</button>
    </div>

    <div class="metro-actions">
      <button class="metro-play-btn" id="metroPlayBtn">▶ 播放</button>
      <button class="tap-btn" id="tapBtn">点此测速</button>
    </div>
  </div>

</div>

<script>
function $(id){return document.getElementById(id)}

const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function freqToNote(freq,refA=440){
  if(!freq||freq<20)return null
  const n=12*Math.log2(freq/refA)+69
  const midi=Math.round(n),note=NOTE_NAMES[midi%12],oct=Math.floor(midi/12)-1
  const exact=refA*Math.pow(2,(midi-69)/12),cents=1200*Math.log2(freq/exact)
  return{note,oct,midi,cents,freq,exact}
}
function formatCents(c){return(c>0?'+':'')+c.toFixed(1)+'¢'}

const TUNINGS={
  guitar:{standard:{name:'标准',strings:['E2','A2','D3','G3','B3','E4']},dropD:{name:'Drop D',strings:['D2','A2','D3','G3','B3','E4']},openG:{name:'Open G',strings:['D2','G2','D3','G3','B3','D4']},openD:{name:'Open D',strings:['D2','A2','D3','F#3','A3','D4']},dadgad:{name:'DADGAD',strings:['D2','A2','D3','G3','A3','D4']}},
  bass:{standard4:{name:'4弦标准',strings:['E1','A1','D2','G2']},standard5:{name:'5弦标准',strings:['B0','E1','A1','D2','G2']},dropDBass:{name:'Drop D',strings:['D1','A1','D2','G2']}},
  ukulele:{standard:{name:'标准GCEA',strings:['G4','C4','E4','A4']},dTuning:{name:'D调ADF#B',strings:['A4','D4','F#4','B4']},lowG:{name:'Low G',strings:['G3','C4','E4','A4']}}
};
function parseNote(str){
  const m=str.match(/^([A-G]#?)(-?\d+)$/);if(!m)return null
  const n=m[1],o=parseInt(m[2]),s=NOTE_NAMES.indexOf(n);if(s<0)return null
  const midi=(o+1)*12+s,freq=440*Math.pow(2,(midi-69)/12);return{note:n,oct:o,midi,freq}
}
function populateTunings(){
  const inst=document.querySelector('.inst-btn.active')?.dataset.inst||'guitar',sel=$('tuningSelect')
  sel.innerHTML=''
  for(const[k,v]of Object.entries(TUNINGS[inst])){
    const o=document.createElement('option');o.value=k;o.textContent=v.name+(v.name.length<8?'':'')+' ('+v.strings.join(' ')+')';sel.appendChild(o)
  }
  updateTuningLabel()
}
function updateTuningLabel(){
  const inst=document.querySelector('.inst-btn.active')?.dataset.inst||'guitar'
  const tuning=$('tuningSelect').value
  const info=TUNINGS[inst][tuning]
  $('tuningLabel').textContent=info?info.name+' ('+info.strings.join(' ')+')':''
}
// Instrument button switching
document.querySelectorAll('.inst-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.inst-btn').forEach(b=>b.classList.remove('active'))
    btn.classList.add('active')
    populateTunings()
    // Maintain tuning selection if possible
    if(!TUNINGS[btn.dataset.inst][$('tuningSelect').value]){
      // Fall back to first tuning
      $('tuningSelect').selectedIndex=0
    }
    updateTuningLabel()
  })
})
$('tuningSelect').addEventListener('change',updateTuningLabel)
populateTunings()

// ====== Tuner ======
let tunerCtx=null,tunerAnalyser=null,tunerStream=null,tunerActive=false,tunerRaf=null
let smoothedLogFreq=null,tunerInitAttempted=false
function detectPitch(buffer,sr){
  const N=buffer.length,minLag=Math.floor(sr/1500),maxLag=Math.floor(sr/55)
  let sumSq=0;for(let i=0;i<N;i++)sumSq+=buffer[i]*buffer[i]
  if(Math.sqrt(sumSq/N)<0.008)return null
  function acf(lag){let s=0;for(let i=0;i<N-lag;i++)s+=buffer[i]*buffer[i+lag];return s}
  const r0=acf(0);if(r0<1e-10)return null
  let lag=minLag;while(lag<maxLag&&acf(lag)>acf(lag+1))lag++
  let bestLag=-1,bestVal=-Infinity
  while(lag<maxLag-1){const a=acf(lag-1),b=acf(lag),c=acf(lag+1);if(b>a&&b>=c&&b>bestVal){bestVal=b;bestLag=lag}lag++}
  if(bestLag<0||bestVal/r0<0.4)return null
  const a=acf(bestLag-1),b=bestVal,c=acf(bestLag+1),shift=(a-c)/(2*(a-2*b+c))
  return sr/(bestLag+shift)
}
async function initTuner(){
  if(tunerInitAttempted)return;tunerInitAttempted=true
  setMicStatus('请求麦克风...','')
  try{
    tunerStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}})
    tunerCtx=new AudioContext();const src=tunerCtx.createMediaStreamSource(tunerStream)
    tunerAnalyser=tunerCtx.createAnalyser();tunerAnalyser.fftSize=4096;src.connect(tunerAnalyser)
    tunerActive=true;smoothedLogFreq=null;setMicStatus('调音中','active');$('tunerMsg').textContent='弹奏一根弦'
    tunerLoop()
  }catch(e){setMicStatus('麦克风被拒绝','');$('tunerMsg').textContent='请在浏览器设置中允许麦克风权限后刷新页面';tunerInitAttempted=false}
}
function setMicStatus(text,cls){$('micStatus').textContent=text;$('micDot').className='mic-dot'+(cls?' '+cls:'')}
function stopTuner(){
  tunerActive=false;if(tunerRaf){cancelAnimationFrame(tunerRaf);tunerRaf=null}
  if(tunerStream){tunerStream.getTracks().forEach(t=>t.stop());tunerStream=null}
  if(tunerCtx){tunerCtx.close();tunerCtx=null}
  smoothedLogFreq=null;$('noteDisplay').textContent='-';$('noteDisplay').className='tuner-note'
  $('octaveDisplay').textContent='';$('freqDisplay').innerHTML='<strong>—</strong> Hz'
  $('centsLabel').textContent='';$('centsLabel').className='cents-label'
  $('barNeedle').style.left='50%'
}
function tunerLoop(){
  if(!tunerActive)return
  const buf=new Float32Array(tunerAnalyser.fftSize)
  tunerAnalyser.getFloatTimeDomainData(buf)
  const rawFreq=detectPitch(buf,tunerCtx.sampleRate)
  if(rawFreq){
    const logF=Math.log2(rawFreq)
    if(smoothedLogFreq===null)smoothedLogFreq=logF;else smoothedLogFreq+=(logF-smoothedLogFreq)*0.3
    const freq=Math.pow(2,smoothedLogFreq),info=freqToNote(freq)
    if(info){
      const inst=document.querySelector('.inst-btn.active')?.dataset.inst||'guitar',tuning=$('tuningSelect').value
      const strings=TUNINGS[inst][tuning].strings
      let bestStr=null,bestCents=Infinity
      strings.forEach((s,i)=>{const p=parseNote(s);if(!p)return;const c=Math.abs(1200*Math.log2(freq/p.freq));if(c<bestCents){bestCents=c;bestStr=i}})
      if(bestCents<200){
        const p=parseNote(strings[bestStr]),deviation=1200*Math.log2(freq/p.freq),absCents=Math.abs(deviation)
        $('noteDisplay').textContent=info.note+info.oct;$('noteDisplay').className='tuner-note'+(absCents<5?' in-tune':'')
        $('freqDisplay').innerHTML='<strong>'+freq.toFixed(1)+'</strong> Hz'
        $('centsLabel').textContent=formatCents(deviation)
        $('centsLabel').className='cents-label'+(absCents<5?' in-tune':absCents<20?'':'')+(deviation>0&&absCents>=5?' sharp':deviation<0&&absCents>=5?' flat':'')
        // Horizontal bar needle: 0¢ = 50%, ±50¢ = 5% / 95%
        const pct=50+Math.max(-45,Math.min(45,deviation/50*45))
        $('barNeedle').style.left=pct+'%'
        $('tunerMsg').textContent='目标 '+strings[bestStr]+' '+(absCents<5?'✓ 准了':absCents<15?'接近':deviation>0?'↗ 偏高':'↙ 偏低')
      }else{$('noteDisplay').textContent=info.note+info.oct;$('noteDisplay').className='tuner-note';$('freqDisplay').innerHTML='<strong>'+freq.toFixed(1)+'</strong> Hz';$('centsLabel').textContent='';$('centsLabel').className='cents-label';$('barNeedle').style.left='50%';$('tunerMsg').textContent='继续弹奏...'}
    }
  }else if(smoothedLogFreq!==null){
    smoothedLogFreq+=(Math.log2(55)-smoothedLogFreq)*0.05
    if(Math.abs(smoothedLogFreq-Math.log2(55))<0.01){smoothedLogFreq=null;$('noteDisplay').textContent='-';$('noteDisplay').className='tuner-note';$('freqDisplay').innerHTML='<strong>—</strong> Hz';$('centsLabel').textContent='';$('centsLabel').className='cents-label';$('barNeedle').style.left='50%'}
  }
  tunerRaf=requestAnimationFrame(tunerLoop)
}
initTuner()

// ====== Metronome ======
const canvas=$('metroCanvas'),ctx=canvas.getContext('2d')
let metroCtx=null,metroPlaying=false,metroNextTime=0,metroStartTime=0
let metroTimer=null,metroBeatIndex=0,metroBpm=60,metroBeatsPerBar=4
let metroSubdiv=0,metroAnimRaf=null
let tapTimes=[],tapTimer=null

function resizeCanvas(){
  const wrap=canvas.parentElement,s=Math.min(wrap.clientWidth||320,340)
  const dpr=Math.min(window.devicePixelRatio||1,2)
  canvas.width=s*dpr;canvas.height=s*dpr
  canvas.style.width=s+'px';canvas.style.height=s+'px'
  drawMetro()
}

function setBpm(v){
  const n=Math.round(Math.max(30,Math.min(280,v)))
  if(n!==metroBpm){metroBpm=n;rotaryClick();drawMetro()}
}
function setTimeSig(sig){
  const beats=parseInt(sig);if(isNaN(beats))return
  metroBeatsPerBar=beats
  document.querySelectorAll('#timeSigGroup .btn').forEach(b=>b.classList.toggle('on',b.dataset.sig===sig))
  if(metroPlaying){metroStop();metroStart()}
  drawMetro()
}
function setSubdiv(v){
  metroSubdiv=parseInt(v)
  document.querySelectorAll('#subdivGroup .btn').forEach(b=>b.classList.toggle('on',b.dataset.sub===v))
  if(metroPlaying){metroStop();metroStart()}
}

// Rotary click sound
function rotaryClick(){
  try{
    if(!metroCtx)metroCtx=new AudioContext()
    if(metroCtx.state==='suspended')metroCtx.resume()
    const t=metroCtx.currentTime
    const osc=metroCtx.createOscillator(),gain=metroCtx.createGain()
    osc.type='sine';osc.frequency.setValueAtTime(2500,t)
    gain.gain.setValueAtTime(0.06,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.006)
    osc.connect(gain);gain.connect(metroCtx.destination);osc.start(t);osc.stop(t+0.006)
  }catch(e){}
}

// Canvas drawing
function drawMetro(handAngle){
  const size=canvas.width,cx=size/2,cy=size/2,scale=size/640

  ctx.clearRect(0,0,size,size)

  // Outer wheel ring - dark, solid, mechanical look
  const rOuter=size*0.49,rInner=size*0.37
  const grad=ctx.createRadialGradient(cx-3*scale,cy-3*scale,size*0.05,cx,cy,rOuter)
  grad.addColorStop(0,'#4a4a4a');grad.addColorStop(.5,'#3a3a3a');grad.addColorStop(1,'#2a2a2a')
  ctx.beginPath();ctx.arc(cx,cy,rOuter,0,Math.PI*2);ctx.arc(cx,cy,rInner,0,Math.PI*2,true)
  ctx.fillStyle=grad;ctx.fill()

  // Outer bezel highlight
  ctx.beginPath();ctx.arc(cx,cy,rOuter-1*scale,0,Math.PI*2)
  ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1*scale;ctx.stroke()

  // Tick marks around the wheel
  const numTicks=48
  for(let i=0;i<numTicks;i++){
    const ang=i/numTicks*Math.PI*2
    const isMain=i%4===0
    const len=isMain?14*scale:8*scale
    const w=isMain?2*scale:1*scale
    const r1=rOuter-3*scale,r2=rOuter-3*scale-len
    ctx.beginPath()
    ctx.moveTo(cx+r1*Math.cos(ang),cy+r1*Math.sin(ang))
    ctx.lineTo(cx+r2*Math.cos(ang),cy+r2*Math.sin(ang))
    ctx.strokeStyle=isMain?'rgba(255,255,255,.7)':'rgba(255,255,255,.3)'
    ctx.lineWidth=w;ctx.stroke()
  }

  // Inner ring (light)
  const innerR=rInner-4*scale
  ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2)
  const ig=ctx.createRadialGradient(cx,cy,0,cx,cy,innerR)
  ig.addColorStop(0,'#fafaf8');ig.addColorStop(1,'#f0eee8')
  ctx.fillStyle=ig;ctx.fill()
  ctx.strokeStyle='var(--border)';ctx.lineWidth=1*scale;ctx.stroke()

  // Beat area
  const beatR=innerR*0.82

  // Radial guide lines
  for(let i=0;i<metroBeatsPerBar;i++){
    const ang=i/metroBeatsPerBar*Math.PI*2-Math.PI/2
    ctx.beginPath();ctx.moveTo(cx+8*scale*Math.cos(ang),cy+8*scale*Math.sin(ang))
    ctx.lineTo(cx+beatR*Math.cos(ang),cy+beatR*Math.sin(ang))
    ctx.strokeStyle='rgba(0,0,0,.04)';ctx.lineWidth=1*scale;ctx.stroke()
  }

  // Beat dots
  for(let i=0;i<metroBeatsPerBar;i++){
    const ang=i/metroBeatsPerBar*Math.PI*2-Math.PI/2
    const x=cx+beatR*Math.cos(ang),y=cy+beatR*Math.sin(ang)
    const isAccent=i===0
    let active=false
    if(handAngle!==undefined&&metroPlaying){
      const ha=(handAngle+Math.PI/2+Math.PI*4)%(Math.PI*2)
      const ba=(i/metroBeatsPerBar*Math.PI*2+Math.PI*4)%(Math.PI*2)
      const nextBa=((i+1)/metroBeatsPerBar*Math.PI*2+Math.PI*4)%(Math.PI*2)
      if(ha>=ba&&ha<nextBa)active=true
    }
    // Dot shadow
    ctx.beginPath();ctx.arc(x+1,y+1,7*scale,0,Math.PI*2)
    ctx.fillStyle='rgba(0,0,0,.08)';ctx.fill()
    // Dot
    const dotSize=active?7*scale:6*scale
    ctx.beginPath();ctx.arc(x,y,dotSize,0,Math.PI*2)
    if(active){ctx.fillStyle=isAccent?'#000':'var(--accent)';ctx.fill()}
    else{ctx.fillStyle='var(--text2)';ctx.fill()}
    // Inactive dot border
    if(!active){ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=1*scale;ctx.stroke()}
    // Active glow
    if(active){
      ctx.beginPath();ctx.arc(x,y,11*scale,0,Math.PI*2)
      ctx.fillStyle=isAccent?'rgba(0,0,0,.15)':'rgba(212,79,79,.15)'
      ctx.fill()
    }
    // Accent ring
    if(isAccent&&!active){
      ctx.beginPath();ctx.arc(x,y,9.5*scale,0,Math.PI*2)
      ctx.strokeStyle='var(--text2)';ctx.lineWidth=1.2*scale;ctx.stroke()
    }
  }

  // Center dot
  ctx.beginPath();ctx.arc(cx,cy,3.5*scale,0,Math.PI*2)
  ctx.fillStyle='var(--text)';ctx.fill()

  // Hand
  if(handAngle!==undefined){
    const tipX=cx+(innerR*0.78)*Math.cos(handAngle),tipY=cy+(innerR*0.78)*Math.sin(handAngle)
    // Hand glow
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(tipX,tipY)
    ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=8*scale;ctx.lineCap='round';ctx.stroke()
    // Hand
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(tipX,tipY)
    ctx.strokeStyle='var(--text)';ctx.lineWidth=2.5*scale;ctx.lineCap='round';ctx.stroke()
    // Hand tip
    ctx.beginPath();ctx.arc(tipX,tipY,3*scale,0,Math.PI*2)
    ctx.fillStyle='var(--text)';ctx.fill()
  }

  // BPM - darker, bolder
  ctx.fillStyle='#000'
  ctx.font=700+' '+(48*scale)+'px system-ui,sans-serif'
  ctx.textAlign='center';ctx.textBaseline='middle'
  ctx.fillText(metroBpm.toString(),cx,cy-6*scale)
  ctx.fillStyle='var(--text2)'
  ctx.font='bold '+(11*scale)+'px system-ui,sans-serif'
  ctx.fillText('BPM',cx,cy+(28*scale))
}

// Rotary control
let rotaryAngle=null,rotaryAccum=0
function getCanvasAngle(e){
  const rect=canvas.getBoundingClientRect()
  const cx=rect.width/2,cy=rect.height/2
  const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left-cx
  const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top-cy
  return Math.atan2(y,x)
}
function handleRotaryMove(e){
  if(rotaryAngle===null)return
  const a=getCanvasAngle(e)
  let diff=a-rotaryAngle
  if(diff>Math.PI)diff-=Math.PI*2
  if(diff<-Math.PI)diff+=Math.PI*2
  rotaryAccum+=diff
  if(Math.abs(rotaryAccum)>0.15){
    const steps=Math.sign(rotaryAccum)*Math.floor(Math.abs(rotaryAccum)/0.15)
    setBpm(metroBpm+steps)
    rotaryAccum-=steps*0.15
  }
  rotaryAngle=a
}
canvas.addEventListener('touchstart',(e)=>{rotaryAngle=getCanvasAngle(e);rotaryAccum=0},{passive:true})
canvas.addEventListener('touchmove',handleRotaryMove,{passive:false})
canvas.addEventListener('touchend',()=>{rotaryAngle=null;rotaryAccum=0})
canvas.addEventListener('mousedown',(e)=>{rotaryAngle=getCanvasAngle(e);rotaryAccum=0})
canvas.addEventListener('mousemove',handleRotaryMove)
canvas.addEventListener('mouseup',()=>{rotaryAngle=null;rotaryAccum=0})
canvas.addEventListener('mouseleave',()=>{rotaryAngle=null;rotaryAccum=0})

// Time sig / subdiv buttons
document.querySelectorAll('#timeSigGroup .btn').forEach(b=>b.addEventListener('click',()=>setTimeSig(b.dataset.sig)))
document.querySelectorAll('#subdivGroup .btn').forEach(b=>b.addEventListener('click',()=>setSubdiv(b.dataset.sub)))

// Musical tone counting — sample‑accurate, replaces robotic TTS
// Each beat gets a different pitch so you can "hear" which beat you're on
// Beat 1 = C4 (downbeat anchor), 2 = D4, 3 = E4, 4 = F4, 5 = G4 …
const BEAT_PITCHES=[262,294,330,349,392,440,494,523];

function metroNote(time,beatIndex,isAccent){
  if(!metroCtx)return
  const freq=BEAT_PITCHES[beatIndex%BEAT_PITCHES.length]
  const osc=metroCtx.createOscillator(),gain=metroCtx.createGain()
  osc.type='triangle'  // warmer, rounder than sine
  osc.frequency.setValueAtTime(freq,time)
  const vol=isAccent?0.18:0.12
  gain.gain.setValueAtTime(vol,time)
  gain.gain.exponentialRampToValueAtTime(0.001,time+0.08)
  osc.connect(gain);gain.connect(metroCtx.destination)
  osc.start(time);osc.stop(time+0.09)
}
// Subdivision — high, soft, short (doesn't compete with main beat)
function metroSubClick(time){
  if(!metroCtx)return
  const osc=metroCtx.createOscillator(),gain=metroCtx.createGain()
  osc.type='sine'
  osc.frequency.setValueAtTime(1047,time)  // C6 — distinct from main pitches
  gain.gain.setValueAtTime(0.06,time);gain.gain.exponentialRampToValueAtTime(0.001,time+0.015)
  osc.connect(gain);gain.connect(metroCtx.destination);osc.start(time);osc.stop(time+0.018)
}

// Metronome engine
function metroStart(){
  if(metroPlaying){metroStop();return}
  if(!metroCtx)metroCtx=new AudioContext()
  if(metroCtx.state==='suspended')metroCtx.resume()
  metroPlaying=true;metroBeatIndex=0
  metroStartTime=metroCtx.currentTime+0.05;metroNextTime=metroStartTime
  metroTimer=setInterval(metroScheduler,25)
  metroAnimRaf=requestAnimationFrame(metroAnimLoop)
  $('metroPlayBtn').textContent='⏹ 停止';$('metroPlayBtn').classList.add('stop')
}
function metroStop(){
  metroPlaying=false
  if(metroTimer){clearInterval(metroTimer);metroTimer=null}
  if(metroAnimRaf){cancelAnimationFrame(metroAnimRaf);metroAnimRaf=null}
  $('metroPlayBtn').textContent='▶ 播放';$('metroPlayBtn').classList.remove('stop')
  drawMetro()
}
function metroScheduler(){
  if(!metroPlaying||!metroCtx)return
  const la=0.15,bl=60/metroBpm
  while(metroNextTime<metroCtx.currentTime+la){
    const isAccent=metroBeatIndex===0
    metroNote(metroNextTime,metroBeatIndex,isAccent)
    if(metroSubdiv>0){const n=metroSubdiv;for(let s=1;s<n;s++)metroSubClick(metroNextTime+s*bl/n)}
    metroBeatIndex++;metroNextTime+=bl
    if(metroBeatIndex>=metroBeatsPerBar)metroBeatIndex=0
  }
}
function metroAnimLoop(ts){
  if(!metroPlaying||!metroCtx)return
  const t=metroCtx.currentTime
  const totalBeats=(t-metroStartTime)*metroBpm/60
  const handAngle=((totalBeats%metroBeatsPerBar)/metroBeatsPerBar)*Math.PI*2-Math.PI/2
  drawMetro(handAngle)
  metroAnimRaf=requestAnimationFrame(metroAnimLoop)
}

// Tap tempo
$('tapBtn').addEventListener('click',()=>{
  const now=performance.now()
  if(tapTimer)clearTimeout(tapTimer);tapTimer=setTimeout(()=>{tapTimes=[]},2500)
  tapTimes.push(now);if(tapTimes.length>8)tapTimes.shift()
  if(tapTimes.length>=2){
    const intervals=[];for(let i=1;i<tapTimes.length;i++)intervals.push(tapTimes[i]-tapTimes[i-1])
    const avg=intervals.reduce((a,b)=>a+b)/intervals.length,bpm=Math.round(60000/avg)
    if(bpm>=30&&bpm<=280)setBpm(bpm)
  }
})
$('metroPlayBtn').addEventListener('click',metroStart)
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return
  if(e.code==='Space'){e.preventDefault();if($('panel-metronome').classList.contains('active'))metroStart()}
})

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'))
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'))
    btn.classList.add('active');$('panel-'+btn.dataset.tab).classList.add('active')
    if(btn.dataset.tab==='tuner'){if(metroPlaying)metroStop()}else{if(tunerActive)stopTuner()}
    if(btn.dataset.tab==='metronome')resizeCanvas()
  })
})

// AudioContext resume (iOS)
document.addEventListener('touchstart',()=>{
  if(!metroCtx)metroCtx=new AudioContext()
  if(metroCtx.state==='suspended')metroCtx.resume()
  if(tunerCtx&&tunerCtx.state==='suspended')tunerCtx.resume()
},{once:true})
document.addEventListener('click',()=>{
  if(!metroCtx)metroCtx=new AudioContext()
  if(metroCtx.state==='suspended')metroCtx.resume()
},{once:true})

window.addEventListener('resize',resizeCanvas)
resizeCanvas()
