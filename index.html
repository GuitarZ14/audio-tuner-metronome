<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>调音器 · 节拍器</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ef;
  --surface:#ffffff;
  --border:#e5e2dc;
  --text:#1a1a1a;
  --text2:#999793;
  --accent:#d44f4f;
  --green:#4caf50;
  --yellow:#f5a623;
  --radius:10px;
  --font:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto}

/* Header */
.header{text-align:center;padding:16px 16px 0;flex-shrink:0}
.header h1{font-size:17px;font-weight:500;letter-spacing:4px;color:var(--text2);margin-bottom:12px}
.tab-bar{display:flex;gap:0;background:var(--surface);border-radius:var(--radius);padding:3px;border:1px solid var(--border)}
.tab-btn{flex:1;padding:9px;text-align:center;border:none;background:transparent;color:var(--text2);font-size:14px;font-weight:400;border-radius:7px;cursor:pointer;transition:.2s}
.tab-btn.active{background:var(--text);color:#fff;font-weight:500}

/* Content */
.content{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.tab-panel{display:none;flex-direction:column;gap:16px}
.tab-panel.active{display:flex}

/* ===== Tuner ===== */
.tuner-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:32px 20px 20px;text-align:center}
.tuner-top{display:flex;align-items:baseline;justify-content:center;gap:6px;margin-bottom:2px}
.tuner-note{font-size:72px;font-weight:300;letter-spacing:1px;line-height:1}
.tuner-octave{font-size:22px;font-weight:300;color:var(--text2)}
.tuner-freq{font-size:13px;color:var(--text2);margin-bottom:20px}
.tuner-msg{font-size:13px;color:var(--text2);margin-bottom:12px;min-height:18px}

/* Semi-circle gauge */
.gauge-wrap{position:relative;width:200px;height:100px;margin:0 auto 12px;overflow:hidden}
.gauge-bg{position:absolute;inset:0;border-radius:100px 100px 0 0;background:linear-gradient(to right,var(--yellow),var(--green) 30%,var(--green) 70%,var(--yellow))}
.gauge-track{position:absolute;inset:3px;border-radius:97px 97px 0 0;background:var(--surface)}
.gauge-needle{position:absolute;bottom:0;left:50%;width:2px;height:85px;background:var(--text);transform-origin:bottom center;transform:translateX(-50%) rotate(0deg);transition:transform .08s ease;border-radius:1px;z-index:2}
.gauge-center{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text2);z-index:1;letter-spacing:1px}
.cents-label{margin-top:4px;font-size:14px;font-weight:400;min-height:20px}
.cents-label.flat{color:var(--yellow)}
.cents-label.sharp{color:var(--yellow)}
.cents-label.in-tune{color:var(--green)}

/* String indicators */
.strings-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.string-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;background:#f0eeea;color:var(--text2);transition:.2s;border:1px solid var(--border)}
.string-dot.active{background:var(--accent);color:#fff;border-color:var(--accent);transform:scale(1.1)}
.string-dot.in-tune{background:var(--green);color:#fff;border-color:var(--green);transform:scale(1.05)}

/* Tuner selects */
.tuner-selects{display:flex;gap:10px}
.tuner-selects select{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' fill='%23999793'%3E%3Cpath d='M0 0l5 6 5-6z'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center}

/* Tuner mic status */
.tuner-mic-status{font-size:12px;color:var(--text2);text-align:center;padding:6px;display:flex;align-items:center;justify-content:center;gap:6px}
.mic-dot{width:8px;height:8px;border-radius:50%;background:var(--text2);animation:none}
.mic-dot.active{background:var(--green);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ===== Metronome ===== */
.metro-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:24px 20px;text-align:center}

.metro-bpm-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:2px;margin-bottom:2px}
.metro-bpm-number{font-size:64px;font-weight:200;line-height:1.1;letter-spacing:-1px}
.bpm-input-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:4px}
.bpm-input-row input[type=number]{width:64px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:18px;text-align:center;-webkit-appearance:none}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:2px;border-radius:1px;background:var(--border);outline:none;margin:14px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--text);cursor:pointer;border:none}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--text);cursor:pointer;border:none}

.tempo-presets{display:flex;gap:4px;flex-wrap:wrap;justify-content:center}
.tempo-presets button{padding:4px 10px;border:1px solid var(--border);border-radius:5px;background:var(--surface);color:var(--text2);font-size:11px;cursor:pointer;transition:.15s}
.tempo-presets button:active{background:var(--text);color:#fff;border-color:var(--text)}

/* Metro controls row */
.metro-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.metro-controls label{display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--text2)}
.metro-controls select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' fill='%23999793'%3E%3Cpath d='M0 0l5 6 5-6z'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center}

/* Beat indicator */
.beat-section{display:flex;flex-direction:column;align-items:center;gap:20px;padding:16px 0}
.beat-ring{width:140px;height:140px;border-radius:50%;border:3px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .05s;background:var(--surface)}
.beat-ring.active{border-color:var(--accent);box-shadow:0 0 0 4px rgba(212,79,79,.15);transform:scale(1.03)}
.beat-ring.accent{border-color:var(--text);box-shadow:0 0 0 4px rgba(26,26,26,.1)}
.beat-count{font-size:40px;font-weight:200;color:var(--text2);transition:color .05s}
.beat-count.active{color:var(--text)}

/* Big play button */
.play-btn-wrap{display:flex;justify-content:center}
.metro-play-btn{width:72px;height:72px;border-radius:50%;border:none;background:var(--text);color:#fff;font-size:28px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.metro-play-btn:active{transform:scale(.92)}
.metro-play-btn.stop{background:var(--accent);padding-left:2px}

/* Tap button */
.tap-btn-wrap{display:flex;justify-content:center;margin-top:-4px}
.tap-btn{padding:8px 20px;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;transition:.15s}
.tap-btn:active{background:var(--text);color:#fff;border-color:var(--text)}

@media(max-width:420px){
  .tuner-note{font-size:56px}
  .gauge-wrap{width:160px;height:80px}
  .gauge-needle{height:68px}
  .metro-bpm-number{font-size:52px}
  .beat-ring{width:120px;height:120px}
  .beat-count{font-size:32px}
  .metro-play-btn{width:64px;height:64px;font-size:24px}
}
</style>
</head>
<body>

<div class="header">
  <h1>调音器 · 节拍器</h1>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="tuner">调音器</button>
    <button class="tab-btn" data-tab="metronome">节拍器</button>
  </div>
</div>

<div class="content">

  <!-- ===== TUNER ===== -->
  <div class="tab-panel active" id="panel-tuner">
    <div class="tuner-card">
      <div class="tuner-top">
        <span class="tuner-note" id="noteDisplay">-</span>
        <span class="tuner-octave" id="octaveDisplay"></span>
      </div>
      <div class="tuner-freq" id="freqDisplay">等待麦克风</div>
      <div class="gauge-wrap">
        <div class="gauge-bg"></div>
        <div class="gauge-track"></div>
        <div class="gauge-needle" id="gaugeNeedle"></div>
        <div class="gauge-center">0¢</div>
      </div>
      <div class="cents-label" id="centsLabel">&nbsp;</div>
      <div class="tuner-msg" id="tunerMsg">请允许麦克风权限</div>
    </div>

    <div class="tuner-selects">
      <select id="instrumentSelect">
        <option value="guitar">吉他</option>
        <option value="bass">贝斯</option>
        <option value="ukulele">尤克里里</option>
      </select>
      <select id="tuningSelect"></select>
    </div>

    <div class="strings-row" id="stringsRow"></div>

    <div class="tuner-mic-status">
      <span class="mic-dot" id="micDot"></span>
      <span id="micStatus">等待启动</span>
    </div>
  </div>

  <!-- ===== METRONOME ===== -->
  <div class="tab-panel" id="panel-metronome">
    <div class="metro-card">
      <div class="metro-bpm-label">BPM</div>
      <div class="metro-bpm-number" id="bpmDisplay">120</div>
      <div class="bpm-input-row">
        <input type="number" id="bpmInput" min="30" max="280" value="120">
      </div>
      <input type="range" id="bpmSlider" min="30" max="280" value="120">
      <div class="tempo-presets">
        <button data-bpm="40">Largo</button>
        <button data-bpm="66">Adagio</button>
        <button data-bpm="80">Andante</button>
        <button data-bpm="108">Moderato</button>
        <button data-bpm="120">Allegro</button>
        <button data-bpm="144">Vivace</button>
        <button data-bpm="176">Presto</button>
      </div>
    </div>

    <div class="beat-section">
      <div class="beat-ring" id="beatRing">
        <span class="beat-count" id="beatCount">1</span>
      </div>

      <div class="play-btn-wrap">
        <button class="metro-play-btn" id="metroPlayBtn">▶</button>
      </div>

      <div class="tap-btn-wrap">
        <button class="tap-btn" id="tapBtn">点此测速</button>
      </div>
    </div>

    <div class="metro-controls">
      <label>拍号
        <select id="timeSigSelect">
          <option value="2/4">2/4</option>
          <option value="3/4">3/4</option>
          <option value="4/4" selected>4/4</option>
          <option value="6/8">6/8</option>
        </select>
      </label>
      <label>细分
        <select id="subdivSelect">
          <option value="0">无</option>
          <option value="2">八分</option>
          <option value="3">三连音</option>
          <option value="4">十六分</option>
        </select>
      </label>
    </div>
  </div>

</div>

<script>
function $(id){return document.getElementById(id)}

const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function freqToNote(freq,refA=440){
  if(!freq||freq<20)return null
  const n=12*Math.log2(freq/refA)+69
  const midi=Math.round(n)
  const note=NOTE_NAMES[midi%12],oct=Math.floor(midi/12)-1
  const exact=refA*Math.pow(2,(midi-69)/12)
  const cents=1200*Math.log2(freq/exact)
  return{note,oct,midi,cents,freq,exact}
}
function formatCents(c){return(c>0?'+':'')+c.toFixed(1)+'¢'}

const TUNINGS={
  guitar:{
    standard:{name:'标准',strings:['E2','A2','D3','G3','B3','E4']},
    dropD:{name:'Drop D',strings:['D2','A2','D3','G3','B3','E4']},
    openG:{name:'Open G',strings:['D2','G2','D3','G3','B3','D4']},
    openD:{name:'Open D',strings:['D2','A2','D3','F#3','A3','D4']},
    dadgad:{name:'DADGAD',strings:['D2','A2','D3','G3','A3','D4']},
  },
  bass:{
    standard4:{name:'4弦标准',strings:['E1','A1','D2','G2']},
    standard5:{name:'5弦标准',strings:['B0','E1','A1','D2','G2']},
    dropDBass:{name:'Drop D',strings:['D1','A1','D2','G2']},
  },
  ukulele:{
    standard:{name:'标准GCEA',strings:['G4','C4','E4','A4']},
    dTuning:{name:'D调ADF#B',strings:['A4','D4','F#4','B4']},
    lowG:{name:'Low G',strings:['G3','C4','E4','A4']},
  }
};
function parseNote(str){
  const m=str.match(/^([A-G]#?)(-?\d+)$/);if(!m)return null
  const n=m[1],o=parseInt(m[2]),s=NOTE_NAMES.indexOf(n)
  if(s<0)return null
  const midi=(o+1)*12+s,freq=440*Math.pow(2,(midi-69)/12)
  return{note:n,oct:o,midi,freq}
}

function populateTunings(){
  const inst=$('instrumentSelect').value,sel=$('tuningSelect')
  sel.innerHTML=''
  for(const[k,v]of Object.entries(TUNINGS[inst])){
    const o=document.createElement('option');o.value=k;o.textContent=v.name+' ('+v.strings.join(' ')+')';sel.appendChild(o)
  }
  updateStrings()
}
function updateStrings(){
  const inst=$('instrumentSelect').value,tuning=$('tuningSelect').value
  const strings=TUNINGS[inst][tuning].strings
  const row=$('stringsRow');row.innerHTML=''
  strings.forEach((s,i)=>{
    const d=document.createElement('div');d.className='string-dot';d.id='stringDot'+(i+1);d.textContent=s;row.appendChild(d)
  })
}
$('instrumentSelect').addEventListener('change',populateTunings)
$('tuningSelect').addEventListener('change',updateStrings)
populateTunings()

// ====== Tuner (auto-start) ======
let tunerCtx=null,tunerAnalyser=null,tunerStream=null
let tunerActive=false,tunerRaf=null
let smoothedLogFreq=null
let micPermissionRequested=false

function detectPitch(buffer,sr){
  const N=buffer.length,minLag=Math.floor(sr/1500),maxLag=Math.floor(sr/55)
  let sumSq=0;for(let i=0;i<N;i++)sumSq+=buffer[i]*buffer[i]
  if(Math.sqrt(sumSq/N)<0.008)return null
  function acf(lag){let s=0;for(let i=0;i<N-lag;i++)s+=buffer[i]*buffer[i+lag];return s}
  const r0=acf(0);if(r0<1e-10)return null
  let lag=minLag;while(lag<maxLag&&acf(lag)>acf(lag+1))lag++
  let bestLag=-1,bestVal=-Infinity
  while(lag<maxLag-1){const a=acf(lag-1),b=acf(lag),c=acf(lag+1);if(b>a&&b>=c&&b>bestVal){bestVal=b;bestLag=lag}lag++}
  if(bestLag<0||bestVal/r0<0.4)return null
  const a=acf(bestLag-1),b=bestVal,c=acf(bestLag+1),shift=(a-c)/(2*(a-2*b+c))
  return sr/(bestLag+shift)
}

let tunerInitAttempted=false
async function initTuner(){
  if(tunerInitAttempted)return
  tunerInitAttempted=true
  setMicStatus('请求麦克风...','')
  try{
    tunerStream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}
    })
    tunerCtx=new AudioContext()
    const src=tunerCtx.createMediaStreamSource(tunerStream)
    tunerAnalyser=tunerCtx.createAnalyser()
    tunerAnalyser.fftSize=4096
    src.connect(tunerAnalyser)
    tunerActive=true
    smoothedLogFreq=null
    setMicStatus('调音中','active')
    $('tunerMsg').textContent='弹奏一根弦'
    tunerLoop()
  }catch(e){
    setMicStatus('麦克风被拒绝','')
    $('tunerMsg').textContent='请在浏览器设置中允许麦克风权限后刷新页面'
    tunerInitAttempted=false
  }
}
function setMicStatus(text,cls){
  $('micStatus').textContent=text
  $('micDot').className='mic-dot'+(cls?' '+cls:'')
}
function stopTuner(){
  tunerActive=false
  if(tunerRaf){cancelAnimationFrame(tunerRaf);tunerRaf=null}
  if(tunerStream){tunerStream.getTracks().forEach(t=>t.stop());tunerStream=null}
  if(tunerCtx){tunerCtx.close();tunerCtx=null}
  smoothedLogFreq=null
  $('noteDisplay').textContent='-';$('octaveDisplay').textContent=''
  $('freqDisplay').textContent='— Hz'
  $('centsLabel').textContent='';$('centsLabel').className='cents-label'
  $('gaugeNeedle').style.transform='translateX(-50%) rotate(0deg)'
  document.querySelectorAll('.string-dot').forEach(d=>{d.className='string-dot'})
}
function tunerLoop(){
  if(!tunerActive)return
  const buf=new Float32Array(tunerAnalyser.fftSize)
  tunerAnalyser.getFloatTimeDomainData(buf)
  const rawFreq=detectPitch(buf,tunerCtx.sampleRate)

  if(rawFreq){
    const logF=Math.log2(rawFreq)
    if(smoothedLogFreq===null)smoothedLogFreq=logF
    else smoothedLogFreq+=(logF-smoothedLogFreq)*0.3
    const freq=Math.pow(2,smoothedLogFreq)
    const info=freqToNote(freq)
    if(info){
      const inst=$('instrumentSelect').value,tuning=$('tuningSelect').value
      const strings=TUNINGS[inst][tuning].strings
      let bestStr=null,bestCents=Infinity
      strings.forEach((s,i)=>{
        const p=parseNote(s);if(!p)return
        const c=Math.abs(1200*Math.log2(freq/p.freq))
        if(c<bestCents){bestCents=c;bestStr=i}
      })
      if(bestCents<200){
        const p=parseNote(strings[bestStr])
        const deviation=1200*Math.log2(freq/p.freq)
        const absCents=Math.abs(deviation)

        $('noteDisplay').textContent=info.note
        $('octaveDisplay').textContent=info.oct
        $('freqDisplay').textContent=freq.toFixed(1)+' Hz'
        $('centsLabel').textContent=formatCents(deviation)
        $('centsLabel').className='cents-label'+(absCents<5?' in-tune':absCents<20?'':'')+
          (deviation>0&&absCents>=5?' sharp':deviation<0&&absCents>=5?' flat':'')

        const angle=Math.max(-60,Math.min(60,deviation/50*60))
        $('gaugeNeedle').style.transform='translateX(-50%) rotate('+angle+'deg)'

        document.querySelectorAll('.string-dot').forEach((d,i)=>{
          d.className='string-dot'
          if(i===bestStr){
            if(absCents<5)d.classList.add('in-tune')
            else d.classList.add('active')
          }
        })
        $('tunerMsg').textContent='目标 '+strings[bestStr]+'  '+
          (absCents<5?'✓ 准了':absCents<15?'接近':deviation>0?'↗ 偏高':'↙ 偏低')
      }else{
        $('noteDisplay').textContent=info.note;$('octaveDisplay').textContent=info.oct
        $('freqDisplay').textContent=freq.toFixed(1)+' Hz'
        $('centsLabel').textContent='';$('centsLabel').className='cents-label'
        $('gaugeNeedle').style.transform='translateX(-50%) rotate(0deg)'
        $('tunerMsg').textContent='继续弹奏...'
        document.querySelectorAll('.string-dot').forEach(d=>{d.className='string-dot'})
      }
    }
  }else{
    if(smoothedLogFreq!==null){
      smoothedLogFreq+=(Math.log2(55)-smoothedLogFreq)*0.05
      if(Math.abs(smoothedLogFreq-Math.log2(55))<0.01){
        smoothedLogFreq=null
        $('noteDisplay').textContent='-';$('octaveDisplay').textContent=''
        $('freqDisplay').textContent='— Hz';$('centsLabel').textContent=''
        $('centsLabel').className='cents-label'
        $('gaugeNeedle').style.transform='translateX(-50%) rotate(0deg)'
        document.querySelectorAll('.string-dot').forEach(d=>{d.className='string-dot'})
      }
    }
  }
  tunerRaf=requestAnimationFrame(tunerLoop)
}

// Auto-start tuner on page load
initTuner()

// ====== Metronome ======
let metroCtx=null,metroPlaying=false,metroNextTime=0,metroStartTime=0
let metroTimer=null,metroBeatIndex=0,metroBpm=120,metroBeatsPerBar=4
let metroSubdiv=0,metroVisualRaf=null

let tapTimes=[],tapTimer=null

function getTimeSig(){
  const v=$('timeSigSelect').value,p=v.split('/')
  return{beats:parseInt(p[0]),noteVal:parseInt(p[1])}
}

function metroStart(){
  if(metroPlaying){metroStop();return}
  if(!metroCtx)metroCtx=new AudioContext()
  if(metroCtx.state==='suspended')metroCtx.resume()
  const sig=getTimeSig()
  metroBeatsPerBar=sig.beats
  metroSubdiv=parseInt($('subdivSelect').value)
  metroPlaying=true;metroBeatIndex=0
  metroStartTime=metroCtx.currentTime+0.05
  metroNextTime=metroStartTime
  metroTimer=setInterval(metroScheduler,25)
  metroVisualRaf=requestAnimationFrame(metroVisualLoop)
  $('metroPlayBtn').textContent='⏹'
  $('metroPlayBtn').classList.add('stop')
}
function metroStop(){
  metroPlaying=false
  if(metroTimer){clearInterval(metroTimer);metroTimer=null}
  if(metroVisualRaf){cancelAnimationFrame(metroVisualRaf);metroVisualRaf=null}
  $('metroPlayBtn').textContent='▶'
  $('metroPlayBtn').classList.remove('stop')
  $('beatRing').className='beat-ring'
  $('beatCount').className='beat-count'
  $('beatCount').textContent='1'
}
function metroScheduler(){
  if(!metroPlaying||!metroCtx)return
  const lookAhead=0.1,beatLen=60/metroBpm
  while(metroNextTime<metroCtx.currentTime+lookAhead){
    const isAccent=metroBeatIndex===0
    metroScheduleClick(metroNextTime,isAccent?1:0.7,isAccent?1500:800)
    if(metroSubdiv>0){
      const n=metroSubdiv
      for(let s=1;s<n;s++){
        const t=metroNextTime+s*beatLen/n
        if(t<metroCtx.currentTime+lookAhead+0.05)metroScheduleClick(t,0.3,800)
      }
    }
    metroBeatIndex++;metroNextTime+=beatLen
    if(metroBeatIndex>=metroBeatsPerBar)metroBeatIndex=0
  }
}
function metroScheduleClick(time,vol,freq){
  if(!metroCtx)return
  const osc=metroCtx.createOscillator(),gain=metroCtx.createGain()
  osc.type='square';osc.frequency.setValueAtTime(freq||800,time)
  gain.gain.setValueAtTime(vol*0.25,time)
  gain.gain.exponentialRampToValueAtTime(0.001,time+0.035)
  osc.connect(gain);gain.connect(metroCtx.destination)
  osc.start(time);osc.stop(time+0.035)
}
function metroVisualLoop(now){
  if(!metroPlaying||!metroCtx)return
  const t=metroCtx.currentTime
  const totalBeats=(t-metroStartTime)*metroBpm/60
  const currentBeat=Math.floor(totalBeats)%metroBeatsPerBar
  const beatFrac=totalBeats-Math.floor(totalBeats)
  const display=currentBeat+1
  $('beatCount').textContent=display
  const isAccent=currentBeat===0
  const ring=$('beatRing'),cnt=$('beatCount')
  if(beatFrac<0.08){ring.className='beat-ring active'+(isAccent?' accent':'');cnt.className='beat-count active'}
  else if(beatFrac<0.25){ring.className='beat-ring'+(isAccent?' accent':'');cnt.className='beat-count'}
  else{ring.className='beat-ring';cnt.className='beat-count'}
  metroVisualRaf=requestAnimationFrame(metroVisualLoop)
}

function setBpm(v){
  metroBpm=Math.round(Math.max(30,Math.min(280,v)))
  $('bpmDisplay').textContent=metroBpm;$('bpmInput').value=metroBpm;$('bpmSlider').value=metroBpm
}
$('bpmSlider').addEventListener('input',()=>setBpm(parseInt($('bpmSlider').value)))
$('bpmInput').addEventListener('change',()=>setBpm(parseInt($('bpmInput').value)))
document.querySelectorAll('.tempo-presets button').forEach(b=>{
  b.addEventListener('click',()=>setBpm(parseInt(b.dataset.bpm)))
})

$('tapBtn').addEventListener('click',()=>{
  const now=performance.now()
  if(tapTimer)clearTimeout(tapTimer)
  tapTimer=setTimeout(()=>{tapTimes=[]},2500)
  tapTimes.push(now)
  if(tapTimes.length>8)tapTimes.shift()
  if(tapTimes.length>=2){
    const intervals=[]
    for(let i=1;i<tapTimes.length;i++)intervals.push(tapTimes[i]-tapTimes[i-1])
    const avg=intervals.reduce((a,b)=>a+b)/intervals.length
    const bpm=Math.round(60000/avg)
    if(bpm>=30&&bpm<=280)setBpm(bpm)
  }
})

$('metroPlayBtn').addEventListener('click',metroStart)
$('timeSigSelect').addEventListener('change',()=>{if(metroPlaying){metroStop();metroStart()}})
$('subdivSelect').addEventListener('change',()=>{if(metroPlaying){metroStop();metroStart()}})

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return
  if(e.code==='Space'){e.preventDefault();if($('panel-metronome').classList.contains('active'))metroStart()}
})

// ====== Tab Switching ======
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'))
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'))
    btn.classList.add('active');$('panel-'+btn.dataset.tab).classList.add('active')
    if(btn.dataset.tab==='tuner'){if(metroPlaying)metroStop()}
    else{if(tunerActive)stopTuner()}
  })
})

// AudioContext resume (iOS)
document.addEventListener('touchstart',()=>{
  if(!metroCtx)metroCtx=new AudioContext()
  if(metroCtx.state==='suspended')metroCtx.resume()
  if(tunerCtx&&tunerCtx.state==='suspended')tunerCtx.resume()
},{once:true})
document.addEventListener('click',()=>{
  if(!metroCtx)metroCtx=new AudioContext()
  if(metroCtx.state==='suspended')metroCtx.resume()
  if(tunerCtx&&tunerCtx.state==='suspended')tunerCtx.resume()
},{once:true})
</script>
